<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Which AOT Character Are You?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=IM+Fell+English:ital@0;1&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0908;
            --bg-elevated: #141210;
            --red: #8B0000;
            --red-bright: #a4161a;
            --gold: #8B6914;
            --text: #9a9184;
            --text-bright: #c9c0b3;
            --border: #2a2520;
            --border-light: #3d3530;
            --shadow: #050403;
        }

        body {
            font-family: 'Barlow Condensed', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(20, 18, 16, 0.4) 2px,
                    rgba(20, 18, 16, 0.4) 4px
                ),
                radial-gradient(ellipse at 50% 0%, rgba(139, 0, 0, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(0, 0, 0, 0.8) 0%, transparent 50%);
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 1px,
                    rgba(0,0,0,0.03) 1px,
                    rgba(0,0,0,0.03) 2px
                );
            pointer-events: none;
            z-index: 1;
        }

        .container {
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .card {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            padding: 0;
            position: relative;
            box-shadow: 
                0 20px 60px var(--shadow),
                inset 0 1px 0 rgba(255,255,255,0.03);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, 
                var(--red) 0%, 
                var(--red-bright) 50%, 
                var(--red) 100%);
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.4);
        }

        .card-content {
            padding: 40px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-bright);
            margin-bottom: 16px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            position: relative;
            padding-bottom: 16px;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 2px;
            background: var(--red);
        }

        .subtitle {
            font-family: 'IM Fell English', serif;
            font-style: italic;
            color: var(--text);
            font-size: 1.05rem;
            margin-bottom: 40px;
            line-height: 1.5;
            opacity: 0.8;
        }

        .btn {
            font-family: 'Cinzel', serif;
            background: transparent;
            color: var(--text-bright);
            border: 1px solid var(--border-light);
            padding: 16px 40px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 600;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(139, 0, 0, 0.2), 
                transparent);
            transition: left 0.5s ease;
        }

        .btn:hover:not(:disabled)::before {
            left: 100%;
        }

        .btn:hover:not(:disabled) {
            border-color: var(--red);
            color: var(--red-bright);
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.2);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: var(--border);
            color: var(--text);
        }

        .progress-container {
            margin-bottom: 35px;
            padding: 0 40px;
            padding-top: 35px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .progress-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.7rem;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .progress-count {
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            color: var(--red-bright);
            font-weight: 600;
        }

        .progress-bar {
            height: 2px;
            background: var(--border);
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: var(--red);
            transition: width 0.4s ease;
            box-shadow: 0 0 10px rgba(139, 0, 0, 0.5);
        }

        .question-container {
            padding: 0 40px;
            margin-bottom: 30px;
        }

        .question-number {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.65rem;
            color: var(--red);
            text-transform: uppercase;
            letter-spacing: 0.25em;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .question {
            font-family: 'IM Fell English', serif;
            font-size: 1.25rem;
            line-height: 1.6;
            color: var(--text-bright);
            font-weight: 400;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0;
            border-top: 1px solid var(--border);
        }

        .option {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 24px 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.95rem;
            color: var(--text);
            text-align: left;
            position: relative;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .option::before {
            content: '›';
            font-family: 'Cinzel', serif;
            color: var(--red);
            font-size: 1.2rem;
            opacity: 0;
            transition: all 0.3s ease;
            transform: translateX(-10px);
        }

        .option:hover {
            background: rgba(139, 0, 0, 0.03);
            color: var(--text-bright);
            padding-left: 50px;
        }

        .option:hover::before {
            opacity: 1;
            transform: translateX(0);
        }

        .option.selected {
            background: rgba(139, 0, 0, 0.08);
            color: var(--text-bright);
            padding-left: 50px;
            border-left: 3px solid var(--red);
        }

        .option.selected::before {
            opacity: 1;
            transform: translateX(0);
            color: var(--red-bright);
        }

        .nav-buttons {
            padding: 30px 40px 40px;
            display: flex;
            justify-content: flex-end;
            border-top: 1px solid var(--border);
            margin-top: 0;
        }

        .result-card {
            text-align: center;
            padding: 0;
        }

        .result-hero {
            position: relative;
            width: 100%;
            height: 450px;
            overflow: hidden;
            border-bottom: 1px solid var(--border);
        }

        .result-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            filter: grayscale(30%) contrast(1.2) brightness(0.9);
        }

        .result-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: linear-gradient(to top, var(--bg-elevated) 0%, transparent 100%);
        }

        .result-content {
            padding: 40px;
            margin-top: -80px;
            position: relative;
            z-index: 2;
        }

        .result-name {
            font-family: 'Cinzel', serif;
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--text-bright);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .result-tag {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.85rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.25em;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .result-quote {
            font-family: 'IM Fell English', serif;
            font-style: italic;
            font-size: 1.15rem;
            color: var(--text);
            max-width: 500px;
            margin: 0 auto 35px;
            line-height: 1.7;
            position: relative;
            padding: 20px 30px;
        }

        .result-quote::before,
        .result-quote::after {
            content: '"';
            position: absolute;
            font-size: 3rem;
            color: var(--red);
            opacity: 0.3;
            font-family: 'Cinzel', serif;
            line-height: 1;
        }

        .result-quote::before {
            top: -10px;
            left: 0;
        }

        .result-quote::after {
            content: '"';
            bottom: -20px;
            right: 0;
        }

        .traits {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .trait {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.7rem;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 16px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            background: rgba(0,0,0,0.2);
        }

        .result-desc {
            font-family: 'IM Fell English', serif;
            font-size: 1rem;
            line-height: 1.8;
            color: var(--text);
            max-width: 500px;
            margin: 0 auto 40px;
            opacity: 0.9;
        }

        .result-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            padding-bottom: 20px;
        }

        .save-card {
            background: var(--bg);
            border: 2px solid var(--border);
            padding: 0;
            width: 500px;
            margin: 0 auto;
        }

        .save-card .result-hero {
            height: 350px;
            border-bottom: 2px solid var(--red);
        }

        .save-card .result-content {
            padding: 30px;
            margin-top: -60px;
        }

        .save-card .result-name {
            font-size: 1.8rem;
        }

        .save-card .result-tag {
            font-size: 0.75rem;
            margin-bottom: 20px;
        }

        .save-card .result-quote {
            font-size: 0.95rem;
            padding: 15px 20px;
            margin-bottom: 20px;
        }

        .save-card .trait {
            font-size: 0.65rem;
            padding: 6px 12px;
        }

        .save-card .branding {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.65rem;
            color: var(--red);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-weight: 600;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 600px) {
            .card-content {
                padding: 30px 24px;
            }
            
            .question-container,
            .progress-container {
                padding-left: 24px;
                padding-right: 24px;
            }
            
            .option {
                padding: 20px 24px;
            }
            
            .option:hover,
            .option.selected {
                padding-left: 34px;
            }
            
            .nav-buttons {
                padding: 24px;
            }
            
            h1 {
                font-size: 1.4rem;
            }
            
            .result-hero {
                height: 350px;
            }
            
            .result-name {
                font-size: 1.8rem;
            }
            
            .result-content {
                padding: 30px 24px;
            }
        }

        /* CRT effect overlay */
        .crt::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 999;
            opacity: 0.4;
        }
    </style>
</head>
<body class="crt">
    <div class="container">
        <!-- START SCREEN -->
        <div id="start-screen" class="card">
            <div class="card-content">
                <h1>Which AOT Character Are You?</h1>
                <p class="subtitle">12 questions. No comfort. Find out who you are when everything falls apart.</p>
                <button class="btn" onclick="startQuiz()">Start Quiz</button>
            </div>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="quiz-screen" class="card hidden">
            <div class="progress-container">
                <div class="progress-header">
                    <span class="progress-label">Progress</span>
                    <span class="progress-count" id="progress-text">01 / 12</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                </div>
            </div>
            <div class="question-container">
                <div class="question-number" id="question-number">Question 01</div>
                <div class="question" id="question-text"></div>
            </div>
            <div class="options" id="options-container"></div>
            <div class="nav-buttons">
                <button class="btn" id="next-btn" onclick="nextQuestion()" disabled>Next Question</button>
            </div>
        </div>

        <!-- RESULT SCREEN -->
        <div id="result-screen" class="card hidden">
            <div id="result-content" class="result-card">
                <div class="result-hero">
                    <img class="result-image" id="result-img" src="" alt="">
                    <div class="result-overlay"></div>
                </div>
                <div class="result-content">
                    <div class="result-name" id="result-name"></div>
                    <div class="result-tag" id="result-tag"></div>
                    <div class="result-quote" id="result-quote"></div>
                    <div class="traits" id="result-traits"></div>
                    <div class="result-desc" id="result-desc"></div>
                    <div class="result-actions">
                        <button class="btn" onclick="saveCard()">Save Result</button>
                        <button class="btn" onclick="restartQuiz()">Try Again</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- HIDDEN SAVE CARD -->
        <div id="save-card-template" class="hidden">
            <div class="save-card" id="save-card-content">
                <div class="result-hero">
                    <img class="result-image" id="save-img" src="" alt="">
                    <div class="result-overlay"></div>
                </div>
                <div class="result-content">
                    <div class="result-name" id="save-name"></div>
                    <div class="result-tag" id="save-tag"></div>
                    <div class="result-quote" id="save-quote"></div>
                    <div class="traits" id="save-traits"></div>
                    <div class="branding">yeagerx.exe</div>
                </div>
            </div>
        </div>
    </div>

// QUIZ STATE
let currentQuestions = [];
let currentQuestionIndex = 0;
let scores = {};
let selectedOption = null;

// Fisher-Yates shuffle
function shuffle(array) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// Initialize quiz
function initScores() {
    scores = {};
    charKeys.forEach(key => scores[key] = 0);
}

function startQuiz() {
    initScores();
    
    // Shuffle all questions and pick 12
    const shuffled = shuffle(allQuestions);
    currentQuestions = shuffled.slice(0, 12);
    currentQuestionIndex = 0;
    selectedOption = null;
    
    // Hide start, show quiz
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    document.getElementById('result-screen').classList.add('hidden');
    
    renderQuestion();
}

function renderQuestion() {
    const q = currentQuestions[currentQuestionIndex];
    
    // Update progress
    const progress = ((currentQuestionIndex + 1) / 12) * 100;
    document.getElementById('progress-fill').style.width = progress + '%';
    document.getElementById('progress-text').textContent = 
        String(currentQuestionIndex + 1).padStart(2, '0') + ' / 12';
    document.getElementById('question-number').textContent = 
        'Question ' + String(currentQuestionIndex + 1).padStart(2, '0');
    
    // Render question
    document.getElementById('question-text').textContent = q.text;
    
    // Render options
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    
    q.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.textContent = opt.text;
        btn.onclick = () => selectOption(idx);
        container.appendChild(btn);
    });
    
    // Reset next button
    selectedOption = null;
    document.getElementById('next-btn').disabled = true;
}

function selectOption(index) {
    selectedOption = index;
    
    // Update UI
    const buttons = document.querySelectorAll('.option');
    buttons.forEach((btn, idx) => {
        btn.classList.toggle('selected', idx === index);
    });
    
    document.getElementById('next-btn').disabled = false;
}

function nextQuestion() {
    if (selectedOption === null) return;
    
    // Score the answer
    const q = currentQuestions[currentQuestionIndex];
    const char = q.options[selectedOption].char;
    scores[char]++;
    
    // Move to next or finish
    currentQuestionIndex++;
    
    if (currentQuestionIndex >= 12) {
        showResult();
    } else {
        renderQuestion();
    }
}

function getWinner() {
    let maxScore = -1;
    let winners = [];
    
    for (const [char, score] of Object.entries(scores)) {
        if (score > maxScore) {
            maxScore = score;
            winners = [char];
        } else if (score === maxScore) {
            winners.push(char);
        }
    }
    
    // Tie-breaker: random from winners
    return winners[Math.floor(Math.random() * winners.length)];
}

function showResult() {
    const winnerKey = getWinner();
    const char = characters[winnerKey];
    
    // Hide quiz, show result
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    
    // Random photo
    const photo = char.photos[Math.floor(Math.random() * char.photos.length)];
    document.getElementById('result-img').src = photo;
    
    // Text content
    document.getElementById('result-name').textContent = char.name;
    document.getElementById('result-tag').textContent = char.tag;
    
    // Random quote
    const quote = char.quotes[Math.floor(Math.random() * char.quotes.length)];
    document.getElementById('result-quote').textContent = quote;
    
    // Traits
    const traitsContainer = document.getElementById('result-traits');
    traitsContainer.innerHTML = '';
    char.traits.forEach(trait => {
        const span = document.createElement('span');
        span.className = 'trait';
        span.textContent = trait;
        traitsContainer.appendChild(span);
    });
    
    // Description
    document.getElementById('result-desc').textContent = char.desc;
}

function restartQuiz() {
    document.getElementById('result-screen').classList.add('hidden');
    document.getElementById('start-screen').classList.remove('hidden');
}

// Save card as PNG
function saveCard() {
    const winnerKey = getWinner();
    const char = characters[winnerKey];
    
    // Setup save card content
    const photo = char.photos[Math.floor(Math.random() * char.photos.length)];
    document.getElementById('save-img').src = photo;
    document.getElementById('save-name').textContent = char.name;
    document.getElementById('save-tag').textContent = char.tag;
    
    const quote = char.quotes[Math.floor(Math.random() * char.quotes.length)];
    document.getElementById('save-quote').textContent = quote;
    
    const traitsContainer = document.getElementById('save-traits');
    traitsContainer.innerHTML = '';
    char.traits.forEach(trait => {
        const span = document.createElement('span');
        span.className = 'trait';
        span.textContent = trait;
        traitsContainer.appendChild(span);
    });
    
    // Show temporarily for capture
    const saveCardEl = document.getElementById('save-card-content');
    saveCardEl.classList.remove('hidden');
    
    // Capture with html2canvas
    html2canvas(saveCardEl, {
        scale: 3,
        backgroundColor: '#0a0908',
        useCORS: true
    }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'aot-result.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        
        saveCardEl.classList.add('hidden');
    });
}
